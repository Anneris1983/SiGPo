<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Programa - SiGPo</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1e3a5f; --accent: #d4af37; --bg: #f8f6f1;
            --success: #2d7a4f; --warning: #e67e22; --danger: #c0392b;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); }
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            color: white; padding: 20px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .header-left { flex: 1; }
        .breadcrumb { font-size: 14px; margin-bottom: 12px; }
        .breadcrumb a {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; background: rgba(255,255,255,0.15);
            border: 1.5px solid rgba(255,255,255,0.38);
            color: #fff; border-radius: 8px; font-size: 13px; font-weight: 600;
            text-decoration: none; font-family: 'DM Sans', sans-serif; transition: background .2s;
        }
        .breadcrumb a:hover { background: rgba(255,255,255,0.28); }
        .header h1 { font-family: 'Crimson Pro', serif; font-size: 28px; margin-bottom: 4px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .header-right { display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
        .header-btn {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 10px 20px; background: rgba(255,255,255,0.15);
            border: 1.5px solid rgba(255,255,255,0.38); color: #fff;
            border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; text-decoration: none; font-family: 'DM Sans', sans-serif;
            transition: background .2s;
        }
        .header-btn:hover { background: rgba(255,255,255,0.28); }
        .notif-wrapper { position: relative; }
        .notif-bell { background: none; border: none; cursor: pointer; position: relative; padding: 8px; border-radius: 8px; transition: background 0.2s; }
        .notif-bell:hover { background: rgba(255,255,255,0.15); }
        .notif-bell svg { display: block; }
        .notif-badge { position: absolute; top: 2px; right: 2px; background: #ef4444; color: #fff; font-size: 11px; font-weight: 700; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 5px; border: 2px solid #1e3a5f; line-height: 1; }
        .notif-badge:empty, .notif-badge[data-count="0"] { display: none; }
        .notif-dropdown { display: none; position: absolute; top: calc(100% + 10px); right: 0; width: 380px; max-height: 460px; overflow-y: auto; background: #fff; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.18); z-index: 999; border: 1px solid #e5e7eb; }
        .notif-dropdown.open { display: block; }
        .notif-dropdown-header { padding: 16px 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .notif-dropdown-header h3 { font-size: 15px; font-weight: 700; color: var(--primary); }
        .notif-mark-all { font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: none; font-weight: 600; font-family: 'DM Sans', sans-serif; }
        .notif-mark-all:hover { text-decoration: underline; }
        .notif-item { display: flex; gap: 12px; padding: 14px 20px; border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: background 0.15s; }
        .notif-item:hover { background: #f9fafb; }
        .notif-item.unread { background: #fffbeb; }
        .notif-item.unread:hover { background: #fef3c7; }
        .notif-icon-circle { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .notif-icon-circle.pago { background: #dcfce7; }
        .notif-icon-circle.mora { background: #fee2e2; }
        .notif-icon-circle.solicitud { background: #dbeafe; }
        .notif-icon-circle.reclamo { background: #fef3c7; }
        .notif-icon-circle.alerta { background: #fce7f3; }
        .notif-text { flex: 1; min-width: 0; }
        .notif-text p { font-size: 13px; color: #374151; line-height: 1.4; }
        .notif-text p strong { color: var(--primary); }
        .notif-time { font-size: 11px; color: #9ca3af; margin-top: 3px; }
        .notif-empty { padding: 32px 20px; text-align: center; color: #9ca3af; font-size: 14px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 40px; }
        .page-title { font-family: 'Crimson Pro', serif; font-size: 32px; color: var(--primary); margin-bottom: 12px; }
        .page-subtitle { color: #666; font-size: 16px; margin-bottom: 32px; }
        .cohortes-list { display: flex; flex-direction: column; gap: 20px; }
        .cohorte-card {
            background: white; border-radius: 12px; padding: 28px;
            cursor: pointer; transition: all 0.3s ease;
            border: 2px solid transparent;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex; justify-content: space-between; align-items: center;
        }
        .cohorte-card:hover { border-color: var(--accent); transform: translateX(8px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .cohorte-card.active { border-color: var(--accent); background: linear-gradient(90deg, #fff9e6 0%, white 30%); }
        .cohorte-left { flex: 1; }
        .cohorte-title { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        .cohorte-dates { color: #666; font-size: 15px; margin-bottom: 16px; }
        .cohorte-stats { display: flex; gap: 32px; flex-wrap: wrap; }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .stat-value { font-size: 20px; font-weight: 700; color: var(--primary); }
        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-value.danger { color: var(--danger); }
        .cohorte-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
        .badge { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge.active { background: #d4edda; color: var(--success); }
        .badge.closed { background: #e8e8e8; color: #666; }
        .arrow { font-size: 28px; color: var(--accent); transition: transform 0.3s ease; }
        .cohorte-card:hover .arrow { transform: translateX(8px); }
        .btn-toggle {
            padding: 8px 16px; border-radius: 20px; font-size: 13px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            border: 2px solid; cursor: pointer; transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-toggle.cerrar { background: white; border-color: var(--danger); color: var(--danger); }
        .btn-toggle.cerrar:hover { background: var(--danger); color: white; }
        .btn-toggle.activar { background: white; border-color: var(--success); color: var(--success); }
        .btn-toggle.activar:hover { background: var(--success); color: white; }
        .saldo-positivo { color: var(--success); font-weight: 700; }
        .saldo-negativo { color: var(--danger); font-weight: 700; }
        .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2.5px solid #e0e0e0; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-center { text-align: center; padding: 60px; color: #999; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="header-left">
            <div class="breadcrumb">
                <a href="administrador_2_dashboard.html" onclick="navegar('administrador_2_dashboard.html'); return false;">← Volver a Programas</a>
            </div>
            <h1 id="header-titulo">💼 Cargando programa…</h1>
            <p>Selecciona una cohorte para ver sus estudiantes</p>
        </div>
        <div class="header-right">
            <div class="notif-wrapper">
                <button class="notif-bell" onclick="toggleNotifLocal()" title="Notificaciones" aria-label="Notificaciones">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="notif-badge" id="notif-badge">0</span>
                </button>
                <div class="notif-dropdown" id="notif-dropdown">
                    <div class="notif-dropdown-header">
                        <h3>🔔 Notificaciones</h3>
                        <button class="notif-mark-all" onclick="marcarTodasLeidasLocal()">Marcar todas como leídas</button>
                    </div>
                    <div id="notif-list">
                        <div class="notif-empty">Cargando notificaciones…</div>
                    </div>
                </div>
            </div>
            <a href="portal_login.html" class="header-btn" onclick="return cerrarSesion(event)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Cerrar Sesión
            </a>
        </div>
    </div>
</div>

<div class="container">
    <h1 class="page-title" id="page-title">Cohortes Disponibles</h1>
    <p class="page-subtitle" id="page-subtitle">Cargando…</p>
    <div class="cohortes-list" id="cohortes-list">
        <div class="loading-center"><span class="loading-spinner"></span> Cargando cohortes…</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script>
/* ══════════════════════════════════════════════
   UTILIDADES
   ══════════════════════════════════════════════ */
function fMillones(valor) {
    if (valor === null || valor === undefined) return '$0';
    var num = parseFloat(valor);
    if (num < 0) return '-' + fMillones(Math.abs(num));
    if (num >= 1000000) return '$' + (num / 1000000).toFixed(1).replace('.0', '') + 'M';
    if (num >= 1000) return '$' + Math.round(num / 1000) + 'K';
    return '$' + num.toLocaleString('es-AR');
}

function getParam(name) {
    var url = new URL(window.location.href);
    return url.searchParams.get(name);
}

/* ══════════════════════════════════════════════
   NAVEGACIÓN A COHORTE
   ══════════════════════════════════════════════ */
function irACohorte(cohorteId, event) {
    if (event) event.stopPropagation();
    navegar('administrador_4_cohorte.html?cohorte_id=' + cohorteId + '&programa_id=' + (getParam('id') || ''));
}

/* ══════════════════════════════════════════════
   CAMPANA DE NOTIFICACIONES
   ══════════════════════════════════════════════ */
var notificaciones = [];

function toggleNotifLocal() {
    document.getElementById('notif-dropdown').classList.toggle('open');
}

document.addEventListener('click', function(e) {
    var wrapper = document.querySelector('.notif-wrapper');
    if (wrapper && !wrapper.contains(e.target)) {
        document.getElementById('notif-dropdown').classList.remove('open');
    }
});

function renderNotificacionesLocal(datos) {
    notificaciones = datos || [];
    var sinLeer = notificaciones.filter(function(n) { return !n.leida; }).length;
    var badge = document.getElementById('notif-badge');
    badge.textContent = sinLeer;
    badge.setAttribute('data-count', sinLeer);

    var lista = document.getElementById('notif-list');
    if (notificaciones.length === 0) {
        lista.innerHTML = '<div class="notif-empty">No hay notificaciones</div>';
        return;
    }
    var iconos = { pago: '💰', mora: '🔴', solicitud: '📋', reclamo: '⚠️', alerta: '🚨' };
    lista.innerHTML = notificaciones.map(function(n) {
        return '<div class="notif-item ' + (n.leida ? '' : 'unread') + '" onclick="leerNotifLocal(\'' + n.id + '\')">'
            + '<div class="notif-icon-circle ' + (n.tipo || 'alerta') + '">' + (iconos[n.tipo] || '🔔') + '</div>'
            + '<div class="notif-text"><p>' + n.mensaje + '</p>'
            + '<div class="notif-time">' + (n.tiempo || '') + '</div></div></div>';
    }).join('');
}

function leerNotifLocal(id) {
    notificaciones.forEach(function(n) { if (n.id === id) n.leida = true; });
    renderNotificacionesLocal(notificaciones);
    marcarNotificacionLeida(id);
}

function marcarTodasLeidasLocal() {
    notificaciones.forEach(function(n) { n.leida = true; });
    renderNotificacionesLocal(notificaciones);
    marcarTodasNotificacionesLeidas();
}

function cargarNotificaciones() {
    obtenerNotificaciones('ADMINISTRADOR').then(function(datos) {
        renderNotificacionesLocal(datos);
    });
}

/* ══════════════════════════════════════════════
   TOGGLE ESTADO COHORTE (Activar / Cerrar)
   ══════════════════════════════════════════════ */
function toggleEstado(cohorteId, nuevoEstado, event) {
    if (event) event.stopPropagation();
    var accion = nuevoEstado === 'ACTIVO' ? 'activar' : 'cerrar';
    if (!confirm('¿Querés ' + accion + ' esta cohorte?')) return;

    getSupabase().then(function(sb) {
        sb.from('cohortes').update({ estado: nuevoEstado }).eq('cohorte_id', cohorteId).then(function() {
            cargarPrograma();
        });
    });
}

/* ══════════════════════════════════════════════
   RENDERIZAR COHORTES
   ══════════════════════════════════════════════ */
function renderPrograma(data) {
    if (!data) {
        document.getElementById('cohortes-list').innerHTML = '<div class="loading-center">No se encontró el programa</div>';
        return;
    }

    var icono = getIconoTipo(data.tipo);
    document.getElementById('header-titulo').textContent = icono + ' ' + (data.nombre || 'Programa');

    var cohortes = data.cohortes || [];
    var totalEstudiantes = cohortes.reduce(function(s, c) { return s + (c.estudiantes || 0); }, 0);
    var labelPlural = getLabelNomenclaturaPlural(data.tipo);
    document.getElementById('page-subtitle').textContent = cohortes.length + ' ' + labelPlural.toLowerCase() + ' • ' + totalEstudiantes + ' estudiantes totales';

    var lista = document.getElementById('cohortes-list');
    if (cohortes.length === 0) {
        lista.innerHTML = '<div class="loading-center">No hay cohortes registradas para este programa</div>';
        return;
    }

    lista.innerHTML = cohortes.map(function(c) {
        var esActiva = c.estado === 'ACTIVO';
        var claseCard = 'cohorte-card' + (esActiva ? ' active' : '');
        var claseBadge = esActiva ? 'badge active' : 'badge closed';
        var textoBadge = esActiva ? 'Activa' : 'Cerrada';
        var claseBtn = esActiva ? 'btn-toggle cerrar' : 'btn-toggle activar';
        var textoBtn = esActiva ? '🔒 Cerrar' : '✅ Activar';
        var nuevoEstado = esActiva ? 'CERRADO' : 'ACTIVO';
        var saldo = (c.recaudado || 0) - (c.egresos || 0);
        var claseSaldo = saldo >= 0 ? 'saldo-positivo' : 'saldo-negativo';

        return '<div class="' + claseCard + '" id="cohorte-' + c.id + '" onclick="irACohorte(' + c.id + ', event)">'
            + '<div class="cohorte-left">'
            + '<div class="cohorte-title">' + (c.nombre || 'Cohorte') + '</div>'
            + '<div class="cohorte-dates">' + (c.fechaInicio || '') + ' – ' + (c.fechaFin || '') + '</div>'
            + '<div class="cohorte-stats">'
            + '<div class="stat-box"><div class="stat-label">Estudiantes</div><div class="stat-value">' + (c.estudiantes || 0) + '</div></div>'
            + '<div class="stat-box"><div class="stat-label">Al día</div><div class="stat-value success">' + (c.alDia || 0) + '</div></div>'
            + '<div class="stat-box"><div class="stat-label">En mora</div><div class="stat-value' + ((c.enMora || 0) > 0 ? ' danger' : '') + '">' + (c.enMora || 0) + '</div></div>'
            + '<div class="stat-box"><div class="stat-label">Recaudado</div><div class="stat-value">' + fMillones(c.recaudado) + '</div></div>'
            + '<div class="stat-box"><div class="stat-label">Egresos</div><div class="stat-value warning">' + fMillones(c.egresos) + '</div></div>'
            + '<div class="stat-box"><div class="stat-label">Saldo</div><div class="stat-value ' + ((c.saldo || 0) >= 0 ? 'success' : 'danger') + '">' + fMillones(c.saldo) + '</div></div>'
            + '</div></div>'
            + '<div class="cohorte-right">'
            + '<span class="' + claseBadge + '">' + textoBadge + '</span>'
            + '<button class="' + claseBtn + '" onclick="toggleEstado(' + c.id + ', \'' + nuevoEstado + '\', event)">' + textoBtn + '</button>'
            + '<span class="arrow">→</span>'
            + '</div></div>';
    }).join('');
}

/* ══════════════════════════════════════════════
   CARGAR DATOS DESDE SUPABASE
   ══════════════════════════════════════════════ */
function cargarPrograma() {
    var programaId = getParam('id');
    if (!programaId) {
        document.getElementById('cohortes-list').innerHTML = '<div class="loading-center">No se especificó un programa</div>';
        return;
    }

    obtenerDetallePrograma(programaId).then(function(data) {
        renderPrograma(data);
    }).catch(function(err) {
        console.error('Error cargando programa:', err);
        document.getElementById('cohortes-list').innerHTML = '<div class="loading-center">Error al cargar el programa</div>';
    });
}

/* ══════════════════════════════════════════════
   INICIALIZAR
   ══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', async function() {
    var sesion = await requireAuth();
    if (!sesion) return;
    if (sesion.rol !== 'ADMINISTRADOR') { window.location.href = 'portal_login.html'; return; }

    cargarPrograma();
    cargarNotificaciones();
});
</script>
</body>
</html>
