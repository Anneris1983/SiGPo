<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Estudiantes - Secretaría FCE UNCUYO</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1e3a5f;
            --accent:  #d4af37;
            --success: #2d7a4f;
            --danger:  #c0392b;
            --warning: #e67e22;
            --bg:      #f8f6f1;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); padding: 0; }

        /* ── HEADER ── */
        .page-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            color: white; padding: 16px 28px; border-radius: 0;
            display: flex; justify-content: space-between; align-items: center; gap: 20px;
        }
        .header-left h1 { font-family: 'Crimson Pro', serif; font-size: 24px; margin-bottom: 4px; }
        .header-left p  { opacity: 0.85; font-size: 13px; }
        .stat-row { display: flex; gap: 20px; flex-shrink: 0; align-items: flex-start; }
        .btn-logout {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 6px 13px; border-radius: 8px; font-size: 12px;
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            display: inline-flex; align-items: center; gap: 5px;
            transition: background 0.2s;
        }
        .btn-logout:hover { background: rgba(192,57,43,0.6); border-color: rgba(192,57,43,0.8); }
        .stat-item { text-align: center; }
        .stat-label { font-size: 10px; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 22px; font-weight: 700; margin-top: 2px; }

        /* ── TOOLBAR ── */
        .toolbar {
            background: white; padding: 14px 22px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #e0e0e0; gap: 12px; flex-wrap: wrap;
        }
        .filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .filter-label { font-weight: 600; font-size: 13px; white-space: nowrap; }
        .filter-btn {
            padding: 6px 13px; border: 2px solid #e0e0e0; background: white;
            border-radius: 6px; font-size: 12px; cursor: pointer;
            transition: all 0.2s; font-family: 'DM Sans', sans-serif; white-space: nowrap;
        }
        .filter-btn:hover { border-color: var(--accent); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn {
            padding: 8px 14px; border: none; border-radius: 8px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; font-family: 'DM Sans', sans-serif; white-space: nowrap;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #2d5a87; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #246441; }
        .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-crear { background: var(--accent); color: white; }
        .btn-crear:hover { background: #b8962e; }
        .btn-import { background: #6f42c1; color: white; }
        .btn-import:hover { background: #5a32a3; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── BARRA SELECCIÓN ── */
        .selection-bar {
            display: none; background: #fff8e1; padding: 10px 22px;
            align-items: center; justify-content: space-between;
            border-bottom: 2px solid #ffc107; font-size: 13px; font-weight: 600;
        }
        .selection-bar.show { display: flex; }

        /* ── TABLA ── */
        .table-wrapper { background: white; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { position: sticky; top: 0; z-index: 10; }
        th {
            padding: 9px 6px; text-align: center; font-weight: 600;
            border-bottom: 2px solid #c5c5c5; border-right: 1px solid #ddd;
            white-space: nowrap; font-size: 10px; text-transform: uppercase;
            letter-spacing: 0.4px; color: #555; background: #f0ede6;
        }
        th.col-name  { text-align: left; min-width: 180px; padding-left: 10px; }
        th.col-email { text-align: left; min-width: 175px; padding-left: 8px; }
        th.col-cuota { min-width: 90px; }
        th.col-check { width: 32px; }
        th.tot-hdr   { color: white; font-size: 10px; min-width: 100px; }
        th.th-pagar   { background: #3730a3; }
        th.th-abonado { background: #2d7a4f; }
        th.th-saldo   { background: #c0392b; }

        td {
            padding: 9px 6px; border-bottom: 1px solid #ebebeb;
            border-right: 1px solid #ebebeb; vertical-align: middle;
        }
        tr.fila-est:hover td { background: rgba(212,175,55,0.05); }
        tr.oculta { display: none; }

        .cell-name  { font-weight: 700; color: var(--primary); padding-left: 10px; white-space: nowrap; cursor: default; }
        .cell-name:hover { text-decoration: underline; }
        .cell-desc  { text-align: center; font-weight: 600; }
        .cell-email { font-size: 11px; color: #2d5a87; padding-left: 8px; }

        td[data-est="ABONADA"]      { background: #d4edda; color: #1e7e44; text-align:center; font-weight:600; }
        td[data-est="PAGO_PARCIAL"] { background: #fff3cd; color: #856404; text-align:center; font-weight:600; font-size:10px; }
        td[data-est="EN_MORA"]      { background: #f8d7da; color: #c0392b; text-align:center; font-weight:600; }
        td[data-est="PENDIENTE"]    { background: #f0f0f0; color: #aaa;    text-align:center; font-weight:600; }
        td[data-est="NO_APLICA"]    { background: #fafafa; color: #ccc; font-style:italic; font-size:10px;
                                      border: 1px dashed #e0e0e0; text-align:center; }

        .cell-tot-pagar   { background:#eef2ff; color:#1e3a5f; font-weight:700; text-align:right; padding-right:10px; white-space:nowrap; }
        .cell-tot-abonado { background:#d4edda; color:#1e7e44; font-weight:700; text-align:right; padding-right:10px; white-space:nowrap; }
        .cell-saldo-pos   { background:#f8d7da; color:#c0392b; font-weight:700; text-align:right; padding-right:10px; white-space:nowrap; }
        .cell-saldo-cero  { background:#d4edda; color:#1e7e44; font-weight:700; text-align:right; padding-right:10px; white-space:nowrap; }

        .edit-btn {
            background:none; border:none; cursor:pointer; font-size:11px;
            margin-left:3px; opacity:0.4; transition:opacity 0.2s; vertical-align:middle;
        }
        .edit-btn:hover { opacity:1; }

        /* ── EMPTY ── */
        .empty-state { display:none; text-align:center; padding:60px 20px; color:#aaa; }
        .empty-state.show { display:block; }

        /* ── LEYENDA ── */
        .leyenda {
            background:white; padding:12px 22px;
            display:flex; align-items:center; gap:18px; flex-wrap:wrap;
            border-top:1px solid #e8e8e8; font-size:12px; color:#555;
            border-radius:0 0 12px 12px; box-shadow:0 4px 16px rgba(0,0,0,0.07);
        }
        .ley-item { display:flex; align-items:center; gap:5px; }
        .ley-box { width:18px; height:13px; border-radius:3px; flex-shrink:0; }
        .ley-abonada   { background:#d4edda; border:1px solid #b8dcc7; }
        .ley-parcial   { background:#fff3cd; border:1px solid #ffe082; }
        .ley-mora      { background:#f8d7da; border:1px solid #f1a8b0; }
        .ley-pendiente { background:#f0f0f0; border:1px solid #d0d0d0; }
        .ley-nodebe    { background:#fafafa; border:1px dashed #d0d0d0; }

        /* ── SPINNER ── */
        .spinner-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(255,255,255,0.78); z-index:9000;
            align-items:center; justify-content:center; flex-direction:column; gap:14px;
        }
        .spinner-overlay.show { display:flex; }
        .spinner { width:42px; height:42px; border:4px solid #e0e0e0; border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── MODALES ── */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:white; border-radius:16px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.25); overflow:hidden; animation:mIn 0.22s ease; }
        @keyframes mIn { from{opacity:0;transform:scale(0.94) translateY(-8px);} to{opacity:1;transform:scale(1) translateY(0);} }
        .modal-hdr { background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 100%); color:white; padding:18px 22px; display:flex; justify-content:space-between; align-items:flex-start; }
        .modal-hdr h2 { font-family:'Crimson Pro',serif; font-size:20px; margin-bottom:2px; }
        .modal-hdr p  { font-size:12px; opacity:0.85; }
        .modal-close { background:rgba(255,255,255,0.2); border:none; color:white; width:30px; height:30px; border-radius:8px; font-size:18px; cursor:pointer; flex-shrink:0; transition:background 0.2s; line-height:1; }
        .modal-close:hover { background:rgba(255,255,255,0.35); }
        .modal-body   { padding:22px; }
        .modal-footer { padding:14px 22px; border-top:1px solid #f0ede6; display:flex; justify-content:flex-end; gap:10px; }
        .mfield { margin-bottom:16px; }
        .mfield label { display:block; font-weight:600; font-size:12px; color:var(--primary); margin-bottom:5px; }
        .mfield input, .mfield select, .mfield textarea { width:100%; padding:9px 11px; border:2px solid #e0e0e0; border-radius:8px; font-size:13px; font-family:'DM Sans',sans-serif; transition:border-color 0.2s; }
        .mfield input:focus, .mfield select:focus, .mfield textarea:focus { outline:none; border-color:var(--primary); }
        .mgrid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .mhint  { font-size:11px; color:#999; margin-top:3px; }
        .btn-cancel { padding:9px 18px; background:white; border:2px solid #ddd; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; color:#666; font-family:'DM Sans',sans-serif; }
        .btn-cancel:hover { background:#f0f0f0; }
        .btn-save   { padding:9px 18px; background:var(--success); color:white; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .btn-save:hover { background:#246441; }
        .btn-purple { padding:9px 18px; background:#6f42c1; color:white; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .btn-purple:hover { background:#5a32a3; }
        .btn-purple:disabled { opacity:0.4; cursor:not-allowed; }

        /* Cuota preview */
        .cuotas-preview { max-height:200px; overflow-y:auto; border:1px solid #e0e0e0; border-radius:8px; }
        .cprev-row { display:flex; align-items:center; gap:10px; padding:7px 12px; border-bottom:1px solid #f0f0f0; font-size:12px; }
        .cprev-row:last-child { border-bottom:none; }

        /* Import */
        .istep { display:flex; align-items:flex-start; gap:14px; margin-bottom:16px; padding:14px; background:#f8f6f1; border-radius:10px; border-left:4px solid #6f42c1; }
        .istep-num { width:28px; height:28px; border-radius:50%; background:#6f42c1; color:white; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .istep h4 { font-size:13px; font-weight:700; color:var(--primary); margin-bottom:3px; }
        .istep p  { font-size:12px; color:#555; line-height:1.5; }
        .drop-zone { border:2px dashed #6f42c1; border-radius:10px; padding:22px; text-align:center; cursor:pointer; transition:all 0.2s; background:#f9f7ff; }
        .drop-zone:hover, .drop-zone.dragover { background:#ede9ff; border-color:#5a32a3; }
        .drop-zone input { display:none; }
        .imp-preview { display:none; margin-top:12px; background:#f0ede6; border-radius:8px; padding:12px; align-items:center; gap:10px; }
        .imp-preview.show { display:flex; }

        /* Toast */
        .toast-wrap { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
        .toast { background:#1e3a5f; color:white; padding:12px 20px; border-radius:10px; font-size:13px; font-weight:600; box-shadow:0 8px 24px rgba(0,0,0,0.2); animation:tin 0.28s ease; max-width:340px; }
        .toast.ok  { background:var(--success); }
        .toast.err { background:var(--danger); }
        @keyframes tin { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }

        /* ── PLAN CUOTAS ── */
        .plan-paso-titulo { font-size:13px; font-weight:700; color:var(--primary); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.4px; }
        .plan-fila { display:grid; grid-template-columns:auto 1fr 110px 110px 130px auto; gap:8px; align-items:end; margin-bottom:8px; background:#f8f6f1; border-radius:10px; padding:10px 12px; border:2px solid transparent; transition:border-color 0.2s; }
        .plan-fila:focus-within { border-color:var(--accent); }
        .plan-fila.fila-irregular { border-color:#e67e22; background:#fffbf5; }
        .plan-fila-num { width:26px; height:26px; border-radius:50%; background:var(--primary); color:white; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-bottom:2px; }
        .plan-fila label { display:block; font-size:10px; font-weight:600; color:#777; text-transform:uppercase; letter-spacing:0.3px; margin-bottom:4px; }
        .plan-fila input, .plan-fila select { width:100%; padding:7px 9px; border:1.5px solid #ddd; border-radius:7px; font-size:12px; font-family:'DM Sans',sans-serif; transition:border-color 0.2s; background:white; }
        .plan-fila input:focus, .plan-fila select:focus { outline:none; border-color:var(--primary); }
        .plan-fila .monto-wrap { position:relative; }
        .plan-fila .monto-wrap input { padding-left:20px; }
        .plan-fila .monto-wrap::before { content:'$'; position:absolute; left:8px; top:50%; transform:translateY(-50%); font-size:12px; color:#999; pointer-events:none; }
        .plan-fila .btn-del { background:none; border:none; cursor:pointer; color:#e74c3c; font-size:17px; padding:4px; border-radius:6px; transition:background 0.2s; line-height:1; align-self:end; margin-bottom:2px; }
        .plan-fila .btn-del:hover { background:#fdecea; }
        .btn-agregar-cuota { margin-top:4px; margin-bottom:6px; padding:8px 16px; background:#2d7a4f; color:white; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background 0.2s; }
        .btn-agregar-cuota:hover { background:#246441; }
        .plan-destino-box { background:#f0f8ff; border:1.5px solid #b3d4f0; border-radius:10px; padding:14px 16px; }
        .plan-radio-opcion { display:flex; gap:12px; align-items:flex-start; cursor:pointer; }
        .plan-radio-opcion input[type=radio] { margin-top:3px; accent-color:var(--primary); width:15px; height:15px; flex-shrink:0; }
        .plan-radio-opcion.seleccionado { background:rgba(30,58,95,0.06); border-radius:8px; padding:8px; margin:-8px; }

        /* ── BAJA / ALTA COHORTE ── */
        tr.fila-pasiva-cohorte .cell-name { color:#999; text-decoration:line-through; }
        tr.fila-pasiva-cohorte td { opacity:0.6; }
        .btn-baja-coh {
            background:none; border:1.5px solid #e65100; color:#e65100;
            border-radius:5px; font-size:10px; font-weight:700; padding:2px 7px;
            cursor:pointer; font-family:'DM Sans',sans-serif; white-space:nowrap;
        }
        .btn-baja-coh:hover { background:#fff8e1; }
        .btn-alta-coh {
            background:none; border:1.5px solid #2d7a4f; color:#2d7a4f;
            border-radius:5px; font-size:10px; font-weight:700; padding:2px 7px;
            cursor:pointer; font-family:'DM Sans',sans-serif; white-space:nowrap;
        }
        .btn-alta-coh:hover { background:#d4edda; }
    </style>
</head>
<body>

<div class="spinner-overlay" id="spinner"><div class="spinner"></div><span style="color:#1e3a5f;font-weight:600;font-size:14px;">Cargando...</span></div>
<div class="toast-wrap" id="toasts"></div>

<!-- NAVBAR -->
<div style="background:white;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);position:sticky;top:0;z-index:100;">
    <div style="font-weight:700;color:#1e3a5f;font-size:15px;">Secretaría de Posgrado · FCE UNCUYO</div>
    <div style="display:flex;gap:8px;">
        <a href="secretaria_1_dashboard.html" style="text-decoration:none;color:#666;font-weight:500;padding:8px 14px;border-radius:6px;font-size:14px;font-family:'DM Sans',sans-serif;">🏠 Programas</a>
        <a href="portal_login.html" style="text-decoration:none;color:#666;font-weight:500;padding:8px 14px;border-radius:6px;font-size:14px;font-family:'DM Sans',sans-serif;">🚪 Salir</a>
    </div>
</div>

<div id="app">

    <!-- HEADER -->
    <div class="page-header">
        <div class="header-left">
            <button onclick="history.back()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;padding:6px 13px;border-radius:8px;font-size:12px;cursor:pointer;margin-bottom:10px;display:inline-flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;">← Volver</button>
            <h1 id="hdr-programa">—</h1>
            <p id="hdr-sub">—</p>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:14px;flex-shrink:0;">
            <div class="notif-wrapper" style="position:relative;">
                <button onclick="toggleNotif()" title="Notificaciones" style="background:none;border:none;cursor:pointer;position:relative;padding:8px;border-radius:8px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span id="notif-badge" style="position:absolute;top:0;right:0;background:#ef4444;color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid white;line-height:1;">0</span>
                </button>
                <div id="notif-dropdown" style="display:none;position:absolute;top:calc(100% + 10px);right:0;width:380px;max-height:460px;overflow-y:auto;background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,0.18);z-index:999;border:1px solid #e5e7eb;">
                    <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;">
                        <h3 style="font-size:15px;font-weight:700;color:#1e3a5f;">🔔 Notificaciones</h3>
                        <button onclick="marcarTodasLeidas()" style="font-size:12px;color:#d4af37;cursor:pointer;background:none;border:none;font-weight:600;font-family:'DM Sans',sans-serif;">Marcar todas como leídas</button>
                    </div>
                    <div id="notif-list"><div style="padding:32px 20px;text-align:center;color:#9ca3af;font-size:14px;">Cargando…</div></div>
                </div>
            </div>
                <button class="btn-logout" onclick="cerrarSesion()">🔓 Cerrar sesión</button>
            <div class="stat-row">
                <div class="stat-item"><div class="stat-label">Al día</div><div class="stat-value" id="s-aldia">—</div></div>
                <div class="stat-item"><div class="stat-label">En mora</div><div class="stat-value" id="s-mora" style="color:#ffc107;">—</div></div>
                <div class="stat-item"><div class="stat-label">Pago parcial</div><div class="stat-value" id="s-parcial" style="color:#ffc107;">—</div></div>
                <div class="stat-item"><div class="stat-label">Recaudado</div><div class="stat-value" id="s-recaudado">—</div></div>
            </div>
        </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="filters" id="filtros">
            <span class="filter-label">Filtrar:</span>
            <button class="filter-btn active" data-f="todos">Todos</button>
            <button class="filter-btn" data-f="ABONADA">Al día</button>
            <button class="filter-btn" data-f="EN_MORA">En mora</button>
            <button class="filter-btn" data-f="PAGO_PARCIAL">Pago parcial</button>
            <button class="filter-btn" data-f="PENDIENTE">Pendiente</button>
        </div>
        <div class="actions">
            <button class="btn btn-success" onclick="exportarExcel()">📊 Exportar a Excel</button>
        </div>
    </div>

    
    <!-- TABLA --><!-- TABLA -->
    <div class="table-wrapper">
        <table id="tabla">
            <thead id="t-head"></thead>
            <tbody id="t-body"></tbody>
        </table>
        <div class="empty-state" id="empty"><div style="font-size:48px;margin-bottom:12px;">🔍</div><div style="font-size:15px;font-weight:600;color:#666;">Sin resultados para este filtro</div></div>
    </div>

    <!-- LEYENDA -->
    <div class="leyenda">
        <strong style="color:#333;">Leyenda:</strong>
        <div class="ley-item"><span class="ley-box ley-abonada"></span> Abonada</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script>
const QS          = new URLSearchParams(location.search);
const COHORTE_ID  = QS.get('cohorte_id')  || '';
const PROGRAMA_ID = QS.get('programa_id') || '';

/* placeholder — replaced at runtime */
const MOCK_DATA = {
    programa: { programa_id:'', nombre:'', tipo:'' },
    cohorte:  { cohorte_id:'', nombre:'', fecha_inicio:'', fecha_fin:'', estado:'' },
    columnas: [],

    estudiantes: []
};

/* ══════════════════════════════════════════════════
   PLANTILLAS DE CORREO
══════════════════════════════════════════════════ */
const PLANTILLAS = {
    recordatorio: {
        asunto: 'Recordatorio de vencimiento: {cuota} - {programa}',
        cuerpo:  'Estimado/a {nombre} {apellido},\n\nLe recordamos que la {cuota} del período {periodo} del programa "{programa}" vence el {vencimiento}.\n\nMonto: ${monto}\nCBU: {cbu} | Alias: {alias}\n\nSecretaría de Posgrado - FCE UNCUYO'
    },
    reclamo: {
        asunto: 'Cuota vencida pendiente de pago: {cuota} - {programa}',
        cuerpo:  'Estimado/a {nombre} {apellido},\n\nLe informamos que la {cuota} del período {periodo} se encuentra VENCIDA.\n\nSaldo pendiente: ${monto}\nCBU: {cbu} | Alias: {alias}\n\nLe solicitamos regularizar su situación.\n\nSecretaría de Posgrado - FCE UNCUYO'
    },
    coordinador: {
        asunto: 'Aviso de deuda: {programa}',
        cuerpo:  'Estimado/a Coordinador/a,\n\nEl/la estudiante {apellido}, {nombre} (DNI {dni}) registra cuotas impagas en el programa "{programa}".\n\nSecretaría de Posgrado - FCE UNCUYO'
    }
};

/* ══════════════════════════════════════════════════
   ESTADO
══════════════════════════════════════════════════ */
const V = {
    data: null,
    filtro: 'todos',
    descTarget: null,  // { dni, apellido, nombre, pct, tdEl }
    cuotaTarget: [],   // lista de DNIs seleccionados
};

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {
    var sesion = getSesion();
    if (!sesion) { window.location.href = 'portal_login.html'; return; }
    cargar();
});

async function cargar() {
    spin(true);
    try {
        var sb = await getSupabase();
        var rCoh = await sb.from('cohortes').select('*, programas(nombre)').eq('cohorte_id', COHORTE_ID).single();
        var rCob = await sb.from('cobros').select('cobro_id,dni,concepto,periodo,fecha_vencimiento,monto_original,descuento_porcentaje,monto_final,saldo_pendiente,estado,no_aplica').eq('cohorte_id', COHORTE_ID);
        var rInsc = await sb.from('inscripciones').select('estudiante_id,descuento_porcentaje,estado_academico');
        var rEst = await sb.from('estudiantes').select('id,dni,nombre,apellido,email');

        var cohorte = rCoh.data || {};
        var cobros = (rCob.data || []).filter(function(c){return c && !c.no_aplica;});
        var inscripciones = rInsc.data || [];
        var estudiantes = rEst.data || [];

        var estByDni = {};
        estudiantes.forEach(function(e){ estByDni[String(e.dni)] = e; });
        var inscById = {};
        inscripciones.forEach(function(i){ inscById[i.estudiante_id] = i; });

        var conceptosMap = {};
        var conceptosList = [];
        cobros.forEach(function(c) {
            var key = c.concepto || ('Cuota ' + String(c.nro_cuota||0).padStart(2,'0'));
            if (!conceptosMap[key]) { conceptosMap[key] = true; conceptosList.push({ concepto_base:key, periodo:c.periodo||'' }); }
        });

        var dniMap = {};
        cobros.forEach(function(c) {
            var dniKey = String(c.dni);
            if (!dniMap[dniKey]) {
                var est = estByDni[dniKey] || {};
                var insc = est.id ? (inscById[est.id] || {}) : {};
                dniMap[dniKey] = { dni:c.dni, apellido:est.apellido||dniKey, nombre:est.nombre||'', email:est.email||'', telefono:'', descuento_porcentaje:insc.descuento_porcentaje||0, estado_academico:insc.estado_academico||'ACTIVO', cobros:[] };
            }
            var abonado = Math.max(0, Number(c.monto_final||0) - Number(c.saldo_pendiente||0));
            dniMap[dniKey].cobros.push({ cobro_id:c.cobro_id, concepto:c.concepto||'', periodo:c.periodo||'', fecha_vencimiento:c.fecha_vencimiento||'', fecha_pago:'', monto_original:c.monto_original||c.monto_final||0, descuento_porcentaje:c.descuento_porcentaje||0, monto_final:Number(c.monto_final||0), monto_abonado:abonado, saldo_pendiente:Number(c.saldo_pendiente||0), estado:c.estado||'PENDIENTE' });
        });

        V.data = {
            programa: { nombre: cohorte.programas ? cohorte.programas.nombre : '' },
            cohorte:  { nombre:cohorte.nombre||'Cohorte', fecha_inicio:cohorte.fecha_inicio||'', fecha_fin:cohorte.fecha_fin||'' },
            columnas: conceptosList,
            estudiantes: Object.values(dniMap)
        };
        renderHeader();
        renderTabla();
        actualizarStats();
        actualizarFiltros();
        initFiltros();
    } catch(e) {
        toast('Error al cargar los datos', 'err');
        console.error(e);
    } finally {
        spin(false);
    }
}

/* ══════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════ */
function renderHeader() {
    const { programa, cohorte, estudiantes } = V.data;
    document.getElementById('hdr-programa').textContent = programa.nombre;
    document.getElementById('hdr-sub').textContent =
        `${cohorte.nombre} • ${estudiantes.length} estudiante${estudiantes.length !== 1 ? 's' : ''} • ${cohorte.fecha_inicio} → ${cohorte.fecha_fin}`;
}

function renderTabla() {
    const { columnas, estudiantes } = V.data;
    const thead = document.getElementById('t-head');
    const tbody = document.getElementById('t-body');

    /* ── Encabezado dinámico ── */
    thead.innerHTML = `<tr>
      
      <th class="col-name">Apellido y Nombre</th>
      <th style="min-width:64px;text-align:center;">Desc %</th>
      <th class="col-email">Correo electrónico</th>
      <th style="min-width:76px;text-align:center;background:#f0ede6;font-size:10px;font-weight:600;color:#555;text-transform:uppercase;border-bottom:2px solid #c5c5c5;border-right:1px solid #ddd;">Estado<br>Cohorte</th>
      ${columnas.map(c=>`<th class="col-cuota">${c.concepto_base}<br><span style="font-weight:400;color:#888;font-size:9px;">${c.periodo}</span></th>`).join('')}
      <th class="tot-hdr th-pagar">Total a<br>Pagar</th>
      <th class="tot-hdr th-abonado">Total<br>Abonado</th>
      <th class="tot-hdr th-saldo">Saldo<br>Pendiente</th>
    </tr>`;

    /* ── Filas dinámicas ── */
    tbody.innerHTML = '';
    estudiantes.forEach(est => {
        /* Estado general: peor estado entre sus cobros */
        const estadoGen = calcEstadoGeneral(est.cobros);

        /* Totales */
        let totP = 0, totA = 0, totS = 0;
        est.cobros.forEach(c => { if(c){ totP += c.monto_final; totA += c.monto_abonado; totS += c.saldo_pendiente; }});

        /* Celdas de cuotas — cruce por concepto_base, no por índice.
           Así "no debe abonar" solo aparece si el estudiante
           genuinamente no tiene ese cobro asignado. */
        const cobrosMap = {};
        est.cobros.forEach(c => { if (c) cobrosMap[c.concepto] = c; });

        const celdas = columnas.map(col => {
            const c = cobrosMap[col.concepto_base];
            if (!c) return `<td data-est="NO_APLICA">no debe<br>abonar</td>`;
            let txt = fMonto(c.monto_final);
            if (c.estado === 'PAGO_PARCIAL') txt = `${fMonto(c.monto_abonado)}/${fMonto(c.monto_final)}`;
            if (c.estado === 'PENDIENTE')    txt = '–';
            const title = `${c.concepto} · ${c.periodo} | Abonado: ${fMonto(c.monto_abonado)} | Saldo: ${fMonto(c.saldo_pendiente)}${c.fecha_vencimiento ? ' | Vence: '+c.fecha_vencimiento : ''}`;
            return `<td data-est="${c.estado}" title="${title}">${txt}</td>`;
        }).join('');

        const tr = document.createElement('tr');
        tr.className = 'fila-est' + (est.estado_academico === 'BAJA_COHORTE' ? ' fila-pasiva-cohorte' : '');
        tr.dataset.dni   = est.dni;
        tr.dataset.est   = estadoGen;
        tr.innerHTML = `
          <td class="cell-name">${est.apellido}, ${est.nombre}</td>
          <td class="cell-desc" style="color:${est.descuento_porcentaje>0?'var(--success)':'#aaa'}">
            ${est.descuento_porcentaje}%
          </td>
          <td class="cell-email">${est.email}</td>
          <td style="text-align:center;border-right:1px solid #ebebeb;">
            ${est.estado_academico === 'BAJA_COHORTE' ? '⛔ Baja' : '✅ Activo'}
          </td>
          ${celdas}
          <td class="cell-tot-pagar">${fMonto(totP)}</td>
          <td class="cell-tot-abonado">${fMonto(totA)}</td>
          <td class="${totS===0?'cell-saldo-cero':'cell-saldo-pos'}">${fMonto(totS)}</td>`;
        tbody.appendChild(tr);
    });

    aplicarFiltro();
}

/* Estado general de un estudiante: el "peor" de sus cobros */
function calcEstadoGeneral(cobros) {
    const pesos = { EN_MORA:4, PAGO_PARCIAL:3, PENDIENTE:2, ABONADA:1 };
    let peor = 'ABONADA';
    cobros.forEach(c => {
        if (c && (pesos[c.estado]||0) > (pesos[peor]||0)) peor = c.estado;
    });
    return peor;
}

/* ══════════════════════════════════════════════════
   STATS Y FILTROS
══════════════════════════════════════════════════ */
function actualizarStats() {
    const ests = V.data.estudiantes;
    const cg = e => calcEstadoGeneral(e.cobros);
    const recaud = ests.reduce((s,e)=>s+(e.cobros.reduce((ss,c)=>ss+(c?c.monto_abonado:0),0)),0);
    document.getElementById('s-aldia').textContent    = ests.filter(e=>cg(e)==='ABONADA').length;
    document.getElementById('s-mora').textContent     = ests.filter(e=>cg(e)==='EN_MORA').length;
    document.getElementById('s-parcial').textContent  = ests.filter(e=>cg(e)==='PAGO_PARCIAL').length;
    document.getElementById('s-recaudado').textContent = fMillones(recaud);
}

function actualizarFiltros() {
    const ests = V.data.estudiantes;
    const cg   = e => calcEstadoGeneral(e.cobros);
    const n    = f => f==='todos' ? ests.length : ests.filter(e=>cg(e)===f).length;
    const labels = { todos:'Todos', ABONADA:'Al día', EN_MORA:'En mora', PAGO_PARCIAL:'Pago parcial', PENDIENTE:'Pendiente' };
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.textContent = `${labels[b.dataset.f]} (${n(b.dataset.f)})`;
    });
}

function initFiltros() {
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.onclick = () => {
            V.filtro = b.dataset.f;
            document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            aplicarFiltro();
        };
    });
}

function aplicarFiltro() {
    let vis = 0;
    document.querySelectorAll('.fila-est').forEach(tr => {
        const ok = V.filtro==='todos' || tr.dataset.est===V.filtro;
        tr.classList.toggle('oculta', !ok);
        if(ok) vis++;
    });
    document.getElementById('empty').classList.toggle('show', vis===0);
}

/* ══════════════════════════════════════════════════
   SELECCIÓN
══════════════════════════════════════════════════ */
function toggleAll(cb) {
    document.querySelectorAll('.chk-e').forEach(c => {
        if(!c.closest('tr').classList.contains('oculta')) c.checked = cb.checked;
    });
    onChk();
}
function onChk() {
    const sel = getSel();
    document.getElementById('sel-bar').classList.toggle('show', sel.length>0);
    document.getElementById('sel-txt').textContent = `${sel.length} estudiante${sel.length!==1?'s':''} seleccionado${sel.length!==1?'s':''}`;
    document.getElementById('btn-reclamar').disabled = sel.length===0;
    const vis = [...document.querySelectorAll('.chk-e:not(.oculta)')];
    const all = document.getElementById('chk-all');
    all.indeterminate = sel.length>0 && sel.length<vis.length;
    all.checked = sel.length===vis.length && vis.length>0;
}
function getSel() { return [...document.querySelectorAll('.chk-e:checked')].map(c=>parseInt(c.dataset.dni)); }
function deselAll() {
    document.querySelectorAll('.chk-e').forEach(c=>c.checked=false);
    document.getElementById('chk-all').checked = false;
    onChk();
}

/* ══════════════════════════════════════════════════
   MODAL DESCUENTO
══════════════════════════════════════════════════ */
function abrirDescuento(info, btn) {
    V.descTarget = { ...info, tdEl: btn.closest('td') };
    document.getElementById('desc-sub').textContent = `${info.apellido}, ${info.nombre} — DNI ${info.dni}`;
    document.getElementById('desc-pct').value   = info.pct;
    document.getElementById('desc-desde').value = hoy();
    document.getElementById('desc-hasta').value = '';
    document.getElementById('desc-motivo').value = '';
    abrir('modal-descuento');
    setTimeout(()=>document.getElementById('desc-pct').focus(),80);
}

async function guardarDescuento() {
    const pct   = parseFloat(document.getElementById('desc-pct').value);
    const desde = document.getElementById('desc-desde').value;
    const hasta = document.getElementById('desc-hasta').value;
    const motivo= document.getElementById('desc-motivo').value;
    if (isNaN(pct)||pct<0||pct>100) { toast('Porcentaje inválido (0–100)','err'); return; }
    if (!desde) { toast('Indicá fecha de inicio','err'); return; }
    if (hasta && hasta<desde) { toast('La fecha fin debe ser posterior al inicio','err'); return; }

    spin(true);
    try {
        /* PRODUCCIÓN:
           await apiPost('actualizarDescuento', { dni:V.descTarget.dni, cohorte_id:COHORTE_ID, descuento_porcentaje:pct, desde, hasta, motivo });
        */
        await delay(450);

        // Actualizar estado local
        const est = V.data.estudiantes.find(e=>e.dni===V.descTarget.dni);
        if(est) est.descuento_porcentaje = pct;

        // Actualizar celda
        const td = V.descTarget.tdEl;
        td.style.color = pct>0 ? 'var(--success)' : '#aaa';
        td.firstChild.textContent = `${pct}% `;

        toast('Descuento actualizado ✓','ok');
        cerrar('modal-descuento');
    } catch(e) { toast('Error al guardar','err'); }
    finally { spin(false); }
}

/* ══════════════════════════════════════════════════
   MODAL CREAR PLAN DE CUOTAS
══════════════════════════════════════════════════ */
let planFilas = []; // array de objetos {nombre, periodo, monto, vencimiento}

function abrirCrearCuota() {
    // No requiere selección previa — aplica a cohorte o específicos
    const total = V.data ? V.data.estudiantes.length : 0;
    document.getElementById('plan-n-todos').textContent = total;

    // Subtitle con programa y cohorte
    if (V.data) {
        document.getElementById('cuota-sub').textContent =
            `${V.data.programa.nombre} · ${V.data.cohorte.nombre}`;
    }

    // Init con 2 filas de ejemplo (Inscripción + Cuota 1)
    planFilas = [
        { nombre:'Inscripción', periodo: planPeriodoSiguiente(0), monto:'', vencimiento: planFechaDefault(0) },
        { nombre:'Cuota 1',     periodo: planPeriodoSiguiente(1), monto:'', vencimiento: planFechaDefault(1) },
    ];

    // Reset destino
    document.querySelector('input[name="plan-dest"][value="cohorte"]').checked = true;
    planDestChange();

    planRenderFilas();
    planActualizarResumen();
    planCheckAlerta();
    abrir('modal-cuota');
}

function planPeriodoSiguiente(offset) {
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() + offset);
    return d.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' })
             .replace(/^\w/, c => c.toUpperCase());
}

function planFechaDefault(offset) {
    const d = new Date();
    d.setDate(15);
    d.setMonth(d.getMonth() + offset);
    return d.toISOString().split('T')[0];
}

function planRenderFilas() {
    const cont = document.getElementById('plan-filas');
    cont.innerHTML = '';
    planFilas.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'plan-fila' + (!f.monto ? ' fila-irregular' : '');
        div.innerHTML = `
            <div class="plan-fila-num">${i+1}</div>
            <div>
                <label>Nombre de la cuota</label>
                <input type="text" value="${f.nombre}" placeholder="Cuota ${i+1}"
                    onchange="planFilas[${i}].nombre=this.value; planActualizarResumen();">
            </div>
            <div>
                <label>Período</label>
                <input type="text" value="${f.periodo}" placeholder="Mar 2026"
                    onchange="planFilas[${i}].periodo=this.value;">
            </div>
            <div class="monto-wrap">
                <label>Monto</label>
                <input type="number" value="${f.monto}" placeholder="0"
                    oninput="planFilas[${i}].monto=this.value; planCheckAlerta(); planActualizarResumen(); this.closest('.plan-fila').classList.toggle('fila-irregular',!this.value||parseFloat(this.value)===0);">
            </div>
            <div>
                <label>Vencimiento</label>
                <input type="date" value="${f.vencimiento}"
                    onchange="planFilas[${i}].vencimiento=this.value;">
            </div>
            <button class="btn-del" title="Eliminar" onclick="planEliminar(${i})" ${planFilas.length<=1?'disabled style=opacity:0.3':''}>🗑</button>`;
        cont.appendChild(div);
    });
}

function planAgregar() {
    const offset = planFilas.length;
    planFilas.push({
        nombre: `Cuota ${offset}`,
        periodo: planPeriodoSiguiente(offset),
        monto: '',
        vencimiento: planFechaDefault(offset)
    });
    planRenderFilas();
    planActualizarResumen();
    planCheckAlerta();
    // Scroll al final del contenedor
    const cont = document.getElementById('plan-filas');
    cont.lastElementChild && cont.lastElementChild.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function planEliminar(i) {
    if (planFilas.length <= 1) return;
    planFilas.splice(i, 1);
    planRenderFilas();
    planActualizarResumen();
    planCheckAlerta();
}

function planCheckAlerta() {
    const hayVacio = planFilas.some(f => !f.monto || parseFloat(f.monto) === 0);
    document.getElementById('plan-alerta').style.display = hayVacio ? 'block' : 'none';
}

function planDestChange() {
    const val = document.querySelector('input[name="plan-dest"]:checked').value;
    const selNombres = document.getElementById('plan-sel-nombres');
    if (val === 'especificos') {
        const sel = getSel();
        if (!sel.length) {
            // Si no hay seleccionados, mostrar aviso
            selNombres.style.display = 'block';
            selNombres.textContent = 'Sin estudiantes seleccionados en la tabla. Cerrá el modal, seleccioná estudiantes y volvé a abrir.';
            selNombres.style.color = '#c0392b';
            const nombres = sel.map(dni => {
                const e = V.data.estudiantes.find(x => x.dni === dni);
                return e ? `${e.apellido}, ${e.nombre}` : `DNI ${dni}`;
            });
            selNombres.style.display = 'block';
            selNombres.innerHTML = nombres.map(n => `• ${n}`).join('<br>');
            selNombres.style.color = '#2d5a87';
        }
        selNombres.style.display = 'none';
    }
    planActualizarResumen();
}

function planCantEstudiantes() {
    const val = document.querySelector('input[name="plan-dest"]:checked').value;
    if (val === 'cohorte') return V.data ? V.data.estudiantes.length : 0;
    return getSel().length;
}

function planActualizarResumen() {
    const n   = planCantEstudiantes();
    const q   = planFilas.length;
    const total = planFilas.reduce((s,f)=>s+(parseFloat(f.monto)||0),0);
    const res = document.getElementById('plan-resumen');
    res.innerHTML = `Se crearán <strong>${q}</strong> cuota${q!==1?'s':''} para <strong>${n}</strong> estudiante${n!==1?'s':''} <span style="color:#999;">(${(q*n)} registros totales)</span>`;
}

async function guardarCuotas() {
    if (!planFilas.length) { toast('Agregá al menos una cuota','err'); return; }
    if (!planFilas.some(f=>f.nombre.trim())) { toast('Completá el nombre de al menos una cuota','err'); return; }

    const val = document.querySelector('input[name="plan-dest"]:checked').value;
    let dnis = [];
    if (val === 'cohorte') {
        dnis = V.data.estudiantes.map(e => e.dni);
        dnis = getSel();
        if (!dnis.length) { toast('Seleccioná al menos un estudiante','err'); return; }
    }

    spin(true);
    try {
        /* PRODUCCIÓN:
           await apiPost('crearCuotas', {
             dnis,
             cohorte_id: COHORTE_ID,
             programa_id: PROGRAMA_ID,
             cuotas: planFilas.map(f => ({
               concepto:          f.nombre.trim(),
               periodo:           f.periodo.trim(),
               fecha_vencimiento: f.vencimiento,
               monto_original:    parseFloat(f.monto) || 0,
             }))
           });
        */
        await delay(700);
        const q = planFilas.length;
        toast(`${q} cuota${q>1?'s':''} creadas para ${dnis.length} estudiante${dnis.length>1?'s':''} ✓`, 'ok');
        cerrar('modal-cuota');
        deselAll();
        // En producción: await cargar();
    } catch(e) { toast('Error al crear el plan','err'); }
    finally { spin(false); }
}


/* ══════════════════════════════════════════════════
   BAJA / ALTA EN COHORTE
══════════════════════════════════════════════════ */
let _bcDni = null, _bcNombre = '', _bcNuevoEstado = '';

function confirmarCambioEstado(dni, nombre, nuevoEstado) {
    _bcDni = dni; _bcNombre = nombre; _bcNuevoEstado = nuevoEstado;
    const esBaja = nuevoEstado === 'BAJA_COHORTE';
    const hdr = document.getElementById('mbc-hdr');
    const btn = document.getElementById('mbc-btn');
    hdr.style.background = esBaja
        ? 'linear-gradient(135deg,#e65100 0%,#f59e0b 100%)'
        : 'linear-gradient(135deg,#2d7a4f 0%,#4caf50 100%)';
    document.getElementById('mbc-titulo').textContent = esBaja ? '⛔ Baja en esta cohorte' : '✅ Alta en esta cohorte';
    document.getElementById('mbc-sub').textContent = V.data ? V.data.programa.nombre + ' · ' + V.data.cohorte.nombre : '';
    btn.textContent = esBaja ? '⛔ Confirmar Baja' : '✅ Confirmar Alta';
    btn.style.background = esBaja ? '#ea580c' : '#2d7a4f';
    document.getElementById('mbc-cuerpo').innerHTML = esBaja
        ? `<p style="font-size:13px;color:#555;">Va a dar de baja a <strong>${nombre}</strong> solo en esta cohorte/edición.</p>
           <div style="margin-top:12px;background:#fff8e1;border-left:4px solid #f59e0b;padding:12px;border-radius:8px;font-size:12px;color:#78350f;">
             <strong>Efectos:</strong><ul style="margin:6px 0 0 16px;line-height:1.8;">
               <li>Deja de generar deuda nueva en esta cohorte.</li>
               <li>No se calculan más cuotas pendientes.</li>
               <li>El historial de pagos queda intacto.</li>
               <li>Si cursa otras cohortes/carreras, sigue activo en ellas.</li>
               <li>Puede reactivarse con el botón <strong>Alta</strong>.</li>
             </ul>
           </div>`
        : `<p style="font-size:13px;color:#555;">Va a reactivar a <strong>${nombre}</strong> en esta cohorte/edición.</p>
           <div style="margin-top:12px;background:#d4edda;border-left:4px solid #2d7a4f;padding:12px;border-radius:8px;font-size:12px;color:#155724;">
             <strong>Efectos:</strong><ul style="margin:6px 0 0 16px;line-height:1.8;">
               <li>El estudiante vuelve a estado <strong>ACTIVO</strong> en esta cohorte.</li>
               <li>Se reanudan los cálculos de cuotas y deuda.</li>
               <li>El historial de pagos previo se conserva.</li>
             </ul>
           </div>`;
    abrir('modal-baja-cohorte');
}

async function ejecutarCambioEstado() {
    spin(true);
    try {
        /* PRODUCCIÓN: await apiPost('cambiarEstadoCohorte', { dni:_bcDni, cohorte_id:COHORTE_ID, programa_id:PROGRAMA_ID, estado_academico:_bcNuevoEstado }); */
        await delay(400);
        const est = V.data.estudiantes.find(e => e.dni === _bcDni);
        if (est) est.estado_academico = _bcNuevoEstado;
        toast(_bcNuevoEstado === 'BAJA_COHORTE'
            ? `${_bcNombre} dado/a de baja en esta cohorte ✓`
            : `${_bcNombre} reactivado/a en esta cohorte ✓`, 'ok');
        cerrar('modal-baja-cohorte');
        renderTabla();
    } catch(e) { toast('Error al procesar', 'err'); }
    finally { spin(false); }
}

function abrirCorreo() { cargarPlantilla(); abrir('modal-correo'); }
function cargarPlantilla() {
    const t = document.getElementById('c-tipo').value;
    document.getElementById('c-asunto').value = PLANTILLAS[t].asunto;
    document.getElementById('c-cuerpo').value  = PLANTILLAS[t].cuerpo;
}
async function guardarPlantilla() {
    const t = document.getElementById('c-tipo').value;
    PLANTILLAS[t].asunto = document.getElementById('c-asunto').value.trim();
    PLANTILLAS[t].cuerpo  = document.getElementById('c-cuerpo').value.trim();
    /* PRODUCCIÓN: await apiPost('guardarPlantilla', { tipo:t, ...PLANTILLAS[t] }); */
    toast('Plantilla guardada ✓','ok'); cerrar('modal-correo');
}

async function reclamarSel() {
    const sel = getSel();
    if (!sel.length) { toast('Seleccioná al menos un estudiante','err'); return; }
    spin(true);
    try {
        /* PRODUCCIÓN:
           await apiPost('enviarReclamos', { dnis:sel, cohorte_id:COHORTE_ID, plantilla: PLANTILLAS.reclamo });
        */
        await delay(700);
        toast(`Reclamo enviado a ${sel.length} estudiante${sel.length>1?'s':''} ✓`,'ok');
        deselAll();
    } catch(e) { toast('Error al enviar reclamos','err'); }
    finally { spin(false); }
}

/* ══════════════════════════════════════════════════
   IMPORTAR
══════════════════════════════════════════════════ */
function dlPlantilla() { toast('Descargando plantilla…'); /* window.location.href = `${API_URL}?accion=plantilla`; */ }
function dOver(e)  { e.preventDefault(); document.getElementById('drop-zone').classList.add('dragover'); }
function dLeave()  { document.getElementById('drop-zone').classList.remove('dragover'); }
function dDrop(e)  { e.preventDefault(); dLeave(); const f=e.dataTransfer.files[0]; if(f) mostrarArch(f); }
function fileElegido(e) { const f=e.target.files[0]; if(f) mostrarArch(f); }
function mostrarArch(f) {
    if(!['xlsx','xls'].includes(f.name.split('.').pop().toLowerCase())) { toast('Solo .xlsx o .xls','err'); return; }
    document.getElementById('imp-fn').textContent = f.name;
    document.getElementById('imp-fs').textContent = (f.size/1024).toFixed(1)+' KB';
    document.getElementById('imp-prev').classList.add('show');
    document.getElementById('btn-imp').disabled = false;
}
async function procesarImport() {
    spin(true);
    try {
        /* PRODUCCIÓN: leer con SheetJS → construir array de cobros → apiPost('importarCobros', ...) */
        await delay(700);
        toast('Importación completada ✓','ok');
        cerrar('modal-importar');
        document.getElementById('file-imp').value = '';
        document.getElementById('imp-prev').classList.remove('show');
        document.getElementById('btn-imp').disabled = true;
    } catch(e) { toast('Error en la importación','err'); }
    finally { spin(false); }
}

/* ══════════════════════════════════════════════════
   API HELPERS
══════════════════════════════════════════════════ */
async function apiGet(accion, extra={}) {
    const url = `${API_URL}?accion=${accion}&cohorte_id=${COHORTE_ID}&programa_id=${PROGRAMA_ID}&${new URLSearchParams(extra)}`;
    const r = await fetch(url);
    if(!r.ok) throw new Error(r.status);
    return r.json();
}
async function apiPost(accion, datos={}) {
    const r = await fetch(API_URL, { method:'POST', body: JSON.stringify({ accion, ...datos }) });
    if(!r.ok) throw new Error(r.status);
    return r.json();
}

/* ══════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════ */
function abrir(id)  { document.getElementById(id).classList.add('show'); }
function cerrar(id) { document.getElementById(id).classList.remove('show'); }
function spin(v)    { document.getElementById('spinner').classList.toggle('show',v); }
function hoy()      { return new Date().toISOString().split('T')[0]; }
function delay(ms)  { return new Promise(r=>setTimeout(r,ms)); }

function toast(msg, tipo='') {
    const c = document.getElementById('toasts');
    const d = document.createElement('div');
    d.className = `toast ${tipo}`;
    d.textContent = msg;
    c.appendChild(d);
    setTimeout(()=>d.remove(), 3500);
}

function fMonto(n) {
    if (n===null||n===undefined) return '–';
    return '$'+Math.round(n).toLocaleString('es-AR');
}
function fMillones(n) {
    if (n>=1000000) return '$'+(n/1000000).toFixed(1)+'M';
    if (n>=1000)    return '$'+(n/1000).toFixed(0)+'k';
    return fMonto(n);
}
